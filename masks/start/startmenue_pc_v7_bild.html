<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kabinenfieber – Startmenü PC v7</title>
  <style>
    :root{
      --text:#edf3fa;
      --muted:#c8d1dc;
      --gold:#d9ba66;
      --line:rgba(255,255,255,.10);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      height:100%;
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
      color:var(--text);
      background:#0f1823;
    }
    .screen{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(6,10,18,.08), rgba(6,10,18,.34)),
        url("../../assets/common/startbild.png") center center / cover no-repeat;
    }
    .screen::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.08), rgba(255,255,255,0) 22%),
        linear-gradient(180deg, rgba(5,9,16,.04), rgba(5,9,16,.18) 36%, rgba(5,9,16,.32));
    }
    .wall-panel{
      position:absolute;
      left:50%;
      top:3%;
      transform:translateX(-50%);
      z-index:2;
      width:min(560px, 42vw);
      display:grid;
      justify-items:center;
      text-align:center;
    }
    .logo{
      width:min(360px, 28vw);
      max-width:360px;
      min-width:220px;
      aspect-ratio:1/1;
      object-fit:contain;
      filter:drop-shadow(0 16px 26px rgba(0,0,0,.34));
      margin-bottom:0;
      image-rendering:auto;
      background:none;
    }
    .title{
      margin:0;
      margin-top:-4px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(32px, 2.8vw, 46px);
      line-height:1.0;
      font-weight:700;
      letter-spacing:.05em;
      text-transform:uppercase;
      color:var(--gold);
      text-shadow:0 1px 0 rgba(255,255,255,.14),0 3px 12px rgba(0,0,0,.42);
    }
    .subtitle{
      margin-top:8px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(12px, .95vw, 15px);
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#e5d6a8;
      text-shadow:0 2px 10px rgba(0,0,0,.34);
    }
    .menu-wrap{
      margin-top:24px;
      width:min(360px, 28vw);
      display:grid;
      gap:12px;
    }
    .menu-btn{
      min-height:72px;
      border:none;
      border-radius:16px;
      padding:14px 18px;
      text-align:center;
      cursor:pointer;
      color:var(--text);
      background:linear-gradient(180deg, rgba(29,43,57,.90), rgba(20,32,44,.96));
      border:1px solid var(--line);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      backdrop-filter:blur(4px);
      transition:transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .menu-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(217,186,102,.34);
      background:linear-gradient(180deg, rgba(37,56,74,.96), rgba(20,32,44,.98));
    }
    .menu-btn .big{
      display:block;
      font-size:clamp(17px,1.18vw,21px);
      font-weight:700;
      color:#f4f7fb;
      margin-bottom:4px;
    }
    .menu-btn .small{
      display:block;
      font-size:clamp(10px,.72vw,12px);
      line-height:1.35;
      color:var(--muted);
    }
    .foot{
      position:absolute;
      left:0;
      right:0;
      bottom:18px;
      text-align:center;
      color:rgba(255,255,255,.56);
      font-size:11px;
      z-index:2;
      letter-spacing:.04em;
      text-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    @media (max-width:1100px){
      .wall-panel{width:min(560px, 50vw)}
      .menu-wrap{width:min(360px, 34vw)}
      .logo{width:min(320px, 30vw); min-width:200px}
    }
    @media (max-width:860px){
      .wall-panel{width:min(500px, 66vw)}
      .menu-wrap{width:min(340px, 46vw)}
      .logo{width:min(280px, 34vw); min-width:180px}
    }
  </style>
</head>
<body data-page="start">
  <main class="screen">
    <section class="wall-panel" aria-label="Startmenü">
      <img class="logo" src="../../assets/common/logo.png" alt="Kabinenfieber Logo">
      <h1 class="title">Kabinenfieber</h1>
      <div class="subtitle">Dein Fußballmanager</div>

      <div class="menu-wrap">
        <button id="startCareerBtn" class="menu-btn" type="button"><span class="big">Neue Karriere starten</span>
          <span class="small">Beginnt einen neuen Spielstand und führt dich zur Vereinswahl.</span>
        </button>
        <button id="loadCareerBtn" class="menu-btn" type="button"><span class="big">Bestehende Karriere laden</span>
          <span class="small">Lädt einen vorhandenen Spielstand und setzt deine Saison fort.</span>
        </button>
      </div>
    </section>

    <div class="foot">Kabinenfieber · Startmenü-Prototyp · PC-Version</div>
  </main>
  <script src="../../src/core/app.js"></script>
</body>
</html>
