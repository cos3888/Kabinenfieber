<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kabinenfieber – Vereinsauswahl PC v4</title>
  <style>
    :root{
      --bg:#0f1823; --bg2:#162333; --panel:#1b2836; --panel2:#14202b;
      --line:rgba(255,255,255,.08); --text:#edf3fa; --muted:#9fb0c2;
      --gold:#d6b154; --gold2:#c79b31; --btn:#223446; --btn2:#182432;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg2),var(--bg));color:var(--text);overflow:hidden}
    button{font:inherit}
    .app{height:100vh;display:grid;grid-template-rows:64px 1fr}
    .topbar{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:10px 16px;background:rgba(9,14,22,.94);border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand-badge{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;background:linear-gradient(180deg,#294766,#18314a);border:1px solid rgba(255,255,255,.12);font-size:14px;letter-spacing:.04em}
    .brand h1{margin:0;font-size:18px;white-space:nowrap}
    .status{text-align:center;color:var(--muted);font-size:12px;line-height:1.3}
    .btn{height:38px;padding:0 12px;border:none;border-radius:12px;background:linear-gradient(180deg,var(--btn),var(--btn2));color:var(--text);border:1px solid rgba(255,255,255,.1);font-weight:700}
    .main{padding:14px;overflow:hidden}
    .frame{height:100%;border-radius:24px;border:1px solid var(--line);overflow:hidden;background:linear-gradient(180deg,#162332,#101923);box-shadow:0 18px 42px rgba(0,0,0,.25)}
    .layout{height:100%;display:grid;grid-template-columns:220px 1.15fr 400px}
    .stepcol{padding:16px;border-right:1px solid var(--line);background:rgba(255,255,255,.015)}
    .step-head{margin:0 0 14px;color:var(--muted);font-size:12px;letter-spacing:.04em;text-transform:uppercase}
    .step{display:grid;grid-template-columns:28px 1fr;gap:12px;align-items:center;padding:12px 14px;border-radius:16px;margin-bottom:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);user-select:none;cursor:pointer}
    .step:hover{border-color:rgba(214,177,84,.16)}
    .step-index{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:800;background:rgba(255,255,255,.06);color:var(--muted)}
    .step.done,.step.active{background:linear-gradient(180deg,#233243,#182532);border:1px solid rgba(255,255,255,.08)}
    .step.done .step-index,.step.active .step-index{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#17130c}
    .step strong{display:block;font-size:14px}
    .step small{display:block;margin-top:2px;color:var(--muted);font-size:11px;line-height:1.25}
    .center{padding:14px;overflow:hidden}
    .panel{height:100%;border-radius:20px;border:1px solid var(--line);overflow:hidden;background:linear-gradient(180deg,var(--panel),var(--panel2));display:grid;grid-template-rows:54px 1fr}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 16px;border-bottom:1px solid var(--line)}
    .panel-head h2{margin:0;font-size:22px}
    .hint{color:var(--muted);font-size:11px}
    .scroll{overflow:auto;padding:10px}
    .row{display:grid;grid-template-columns:60px 1fr 132px;gap:12px;align-items:center;padding:11px 12px;border-radius:16px;background:linear-gradient(180deg,#233344,#192736);border:1px solid rgba(255,255,255,.06);margin-bottom:10px;transition:transform .12s ease,border-color .12s ease}
    .row:hover{transform:translateY(-1px);border-color:rgba(214,177,84,.18)}
    .row.active{outline:2px solid rgba(214,177,84,.55)}
    .row.simple{grid-template-columns:1fr 100px}
    .crest{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,.12);font-size:14px;cursor:pointer}
    .meta strong{display:block;font-size:18px;line-height:1.2}
    .meta small{display:block;margin-top:3px;color:var(--muted);font-size:12px}
    .stats{justify-items:end;color:var(--muted);font-size:12px;line-height:1.35}
    .right{padding:14px;border-left:1px solid var(--line);background:rgba(255,255,255,.015)}
    .preview{height:100%;border-radius:20px;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel2));padding:18px;display:grid;grid-template-rows:auto auto auto 1fr auto;gap:14px}
    .preview.hidden-state{display:grid;place-items:center;padding:28px;text-align:center}
    .preview-top{display:flex;align-items:flex-start;gap:14px}
    .bigcrest{width:92px;height:92px;border-radius:20px;display:grid;place-items:center;color:#fff;font-size:28px;font-weight:800;border:1px solid rgba(255,255,255,.12);flex:0 0 auto}
    .preview h2{margin:0;font-size:28px;line-height:1.1}
    .preview h3{margin:4px 0 0;font-size:15px;font-weight:400;color:var(--muted)}
    .copy{margin:0;line-height:1.45;font-size:14px}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tag{padding:6px 10px;border-radius:999px;font-size:11px;color:var(--gold);border:1px solid rgba(255,255,255,.08);background:rgba(12,18,26,.34)}
    .stats-grid{display:grid;gap:10px}
    .stat{padding:12px 14px;border-radius:16px;background:rgba(12,18,26,.34);border:1px solid rgba(255,255,255,.08)}
    .stat span{display:block;font-size:11px;color:var(--muted)}
    .stat strong{display:block;margin-top:4px;font-size:20px}
    .startbtn{width:100%;height:48px;border:none;border-radius:14px;background:linear-gradient(180deg,var(--gold),var(--gold2));color:#17130c;font-size:15px;font-weight:800;cursor:pointer}
    .placeholder-box{max-width:280px}
    .placeholder-box h2{font-size:24px;margin:0 0 12px}
    .placeholder-box p{margin:0;color:var(--muted);line-height:1.5}
  </style>
</head>
<body data-page="club-selection">
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">KF</div>
      <h1>Karriere-Start</h1>
    </div>
    <div class="status">
      <div>Neue Karriere</div>
      <div id="statusLine">Deutschland · Liga 1 · Verein wählen</div>
    </div>
    <button class="btn">Zurück</button>
  </header>

  <main class="main">
    <section class="frame">
      <div class="layout">
        <aside class="stepcol">
          <p class="step-head">Startschritte</p>

          <div class="step" id="step-country" onclick="setStage('countries')">
            <div class="step-index">1</div>
            <div><strong>Länder</strong><small>Land auswählen</small></div>
          </div>

          <div class="step" id="step-league" onclick="setStage('leagues')">
            <div class="step-index">2</div>
            <div><strong>Ligen</strong><small>Liga des gewählten Landes</small></div>
          </div>

          <div class="step" id="step-club" onclick="setStage('clubs')">
            <div class="step-index">3</div>
            <div><strong>Vereine</strong><small>Verein der gewählten Liga</small></div>
          </div>
        </aside>

        <section class="center">
          <div class="panel">
            <div class="panel-head">
              <h2 id="listTitle">Vereine</h2>
              <span id="listHint" class="hint">Nur diese Liste scrollt · Wappen öffnet Profil</span>
            </div>
            <div id="mainList" class="scroll"></div>
          </div>
        </section>

        <aside class="right">
          <div id="previewBox" class="preview"></div>
        </aside>
      </div>
    </section>
  </main>
</div>

<div id="kf-modal-host"></div>
<script>
try{
  localStorage.setItem('kf.selection.v4', JSON.stringify({stage:'countries', countryName:'Deutschland', leagueKey:'Deutschland 1', selectedClubId:null}));
  localStorage.removeItem('kf.career.v4');
  sessionStorage.removeItem('kf.career.v4');
}catch(e){ document.write('<pre id="err">'+String(e)+'</pre>'); }
</script>
<script src="../src/core/app.js"></script>
<script>
setTimeout(function(){
  var country=document.querySelector('[data-country-id="Deutschland"]'); if(country) country.click();
  setTimeout(function(){
    var league=document.querySelector('[data-league-id="Deutschland 1"]'); if(league) league.click();
    setTimeout(function(){
      var club=document.querySelector('[data-club-id]'); if(club) club.click();
      setTimeout(function(){
        var btn=document.getElementById('startWithClubBtn');
        var pre=document.createElement('pre');
        pre.id='dbg';
        pre.textContent='clubRows='+document.querySelectorAll('[data-club-id]').length+'; btn='+(!!btn)+'; status='+(document.getElementById('statusLine')&&document.getElementById('statusLine').textContent)+'; href='+location.href;
        document.body.appendChild(pre);
        if(btn) btn.click();
        setTimeout(function(){
          var pre2=document.createElement('pre');
          pre2.id='dbg2';
          pre2.textContent='afterHref='+location.href;
          document.body.appendChild(pre2);
        }, 500);
      }, 300);
    }, 300);
  }, 300);
}, 300);
</script>
</body>
</html>
